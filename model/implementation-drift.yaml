schema_version: 1
status: acknowledged
rule: SysML is the intended contract; entries remain until the Python realization and verification align.
findings:
  - id: drift.rtg.constraints.target_list_surface
    model_element: contract.rtg.constraints.read_effect
    implementation_symbol: components.rtg.constraints.protocol.RtgConstraints.list_constraints_by_target
    observed: The Python protocol adds an optional kind filter that is not part of the accepted black-box action.
    expected: The action accepts target_type_key and optional live only; kind filtering remains available through list_constraints.
    verification: Remove the extra public parameter or approve it as a language-neutral contract addition, then verify exact boundary signatures.
  - id: drift.rtg.constraints.payload_failure_name
    model_element: contract.rtg.constraints.write_effect
    implementation_symbol: components.rtg.constraints.implementation.InMemoryRtgConstraints.put_constraint
    observed: The Python realization raises RtgConstraintPayloadInvalid for malformed kind-specific payloads.
    expected: The accepted action reports kind/payload shape mismatch as RtgConstraintDefinitionInvalid.
    verification: Align the concrete public failure or approve a distinct language-neutral payload failure before removing this entry.
  - id: drift.rtg.query.json_kind_equality
    model_element: contract.rtg.query.predicates
    implementation_symbol: components.rtg.query.implementation._predicate_matches
    observed: Python equality and membership treat Boolean true as equal to Number 1.
    expected: Equality and membership preserve JSON kinds; Boolean and number are never equal.
    verification: Add equals and contains boundary cases for true versus 1 before removing this entry.
  - id: drift.rtg.query.regex_dialect
    model_element: contract.rtg.query.predicates
    implementation_symbol: components.rtg.query.implementation._regex_matches
    observed: Python re plus a token blacklist accepts named and numeric backreferences.
    expected: Accept only the deterministic RE2-style subset and reject backreferences and lookaround.
    verification: Add rejection tests for named/numeric backreferences and lookaround before removing this entry.
  - id: drift.rtg.change_validation.track_isolation
    model_element: contract.rtg.change_validation.track_isolation
    implementation_symbol: components.rtg.change_validation.implementation.DeterministicRtgChangeValidator.validate_batch
    observed: Reference validation and projection inspect all batch sections before selected-track isolation.
    expected: Unselected sections are neither validated nor projected and cannot affect the report.
    verification: Add malformed-unselected-section tests for each track selection before removing this entry.
  - id: drift.rtg.migration.replacement_status
    model_element: contract.rtg.migration.put_effect
    implementation_symbol: components.rtg.migration.implementation.InMemoryRtgMigration.put_migration
    observed: Replacing an existing migration may assign any valid status without enforcing lifecycle transitions.
    expected: Replacement preserves status or follows the same transition table as set_status.
    verification: Add replacement tests for allowed and skipped transitions before removing this entry.
  - id: drift.rtg.migration.delete_failure_name
    model_element: RtgMigrationDeleteInvalid
    implementation_symbol: components.rtg.migration.protocol.RtgMigrationDeleteRejected
    observed: The Python protocol names the rejected lifecycle-state outcome RtgMigrationDeleteRejected.
    expected: The accepted language-neutral contract names this concrete failure RtgMigrationDeleteInvalid.
    verification: Align the public Python failure name or approve a contract rename, then update boundary tests before removing this entry.
  - id: drift.rtg.controller.system_state_fields
    model_element: RtgControllerSystemState
    implementation_symbol: components.rtg.controller.protocol.RtgControllerSystemState
    observed: The Python value uses live_schema_summary and persisted_snapshots and adds last_transaction_timestamp.
    expected: The accepted contract uses live_schema_counts and persisted_snapshot_paths and does not expose an additional transaction timestamp field.
    verification: Align the Python boundary value or approve a contract clarification, then verify exact response shaping before removing this entry.
