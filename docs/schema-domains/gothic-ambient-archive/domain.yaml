status: alpha
summary: Source-grounded public-domain Gothic literature graph for ambient visual exploration and LLM docent navigation.
prompt_path: docs/guides/vellis/evals/rtg-gothic-ambient-archive-alpha-prompt.md
walkthrough_path: docs/guides/vellis/evals/rtg-gothic-ambient-archive-alpha-walkthrough.md
recommended_first_call:
  tool: rtg_get_system_state
  arguments: {}
domain_tags:
  - literature
  - public-domain
  - gothic
  - ambient
  - docent
  - alpha
runtime_compatibility:
  status: blocked
  requirements:
    - Nocturne Archive schema, seed, and query fixtures
    - schema time shapes
    - link kinds
  blockers:
    - The referenced prototype fixtures and required temporal/link schema metadata are not yet present in the harmonized tree.
schema_summary:
  anchors:
    - Work
    - Source
    - Passage
    - Character
    - Place
