run_instructions:
  - Connect a fresh RTG MCP server and call rtg_validate_graph, then rtg_get_system_state.
  - If the server reports needs_replay, resolve replay or switch to a fresh explicit storage root before writing.
  - Inspect the alpha schema payload under docs/prototypes/nocturne-archive/data/ before staging it.
  - Stage the schema through rtg_stage_schema_migration and apply it with rtg_apply_migration_cutover.
  - Ingest the Lucy Westenra planning seed through rtg_apply_live_anchor_records.
  - Run the bundled cluster, trail, and motif query fixtures.
  - Preserve snapshot or replay evidence before treating the run as complete.
guardrails:
  - Do not auto-install opaque schema payloads; inspect the payloads and use normal governed RTG lanes.
  - Treat all Lucy source spans as unverified until a source-edition pass has been completed.
  - Keep style packs presentation-only; they must not change graph facts or citations.
  - Reify ordered trail stops as TrailStop anchors rather than putting ordinal metadata on links.
  - Avoid modern adaptations, actor likenesses, protected trade dress, and unverifiable license claims.
