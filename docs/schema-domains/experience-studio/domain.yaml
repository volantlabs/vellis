run_instructions:
  - Connect a fresh RTG graph and call rtg_validate_graph, then rtg_get_system_state.
  - Inspect the alpha schema, Ocean Signal Atlas seed, and query fixtures before mutation.
  - Stage schema through rtg_stage_schema_migration and cut over only after strict validation.
  - Ingest the Ocean Signal Atlas planning seed through rtg_apply_live_anchor_records.
  - Run portfolio, source-readiness, and publication-check queries.
  - Preserve a snapshot and verify ledger replay before calling the run complete.
guardrails:
  - Keep operator commitments in Personal Ops; store only product-owned planning facts here.
  - Keep source-grounded runtime facts in their owning domain graph, not in Experience Studio.
  - Model relationships carrying outcome, confidence, or review time as event anchors.
  - Treat commercial-use and publication findings as reviewable evidence, not legal certification.
  - Use graph-qualified identity for cross-graph references; never store raw foreign UUIDs.
  - Do not auto-install opaque schema payloads; inspect all alpha fixtures before applying them.
