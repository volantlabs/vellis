run_instructions:
  - Connect a fresh explicit Time Room History graph and call rtg_validate_graph, then rtg_get_system_state.
  - Inspect the schema, Ada seed, and query fixtures before mutation.
  - Stage schema through rtg_stage_schema_migration and cut over only after strict validation.
  - Dry-run and ingest the Ada records through the anchor-record facade.
  - Run the bounded inventory queries, persist the alpha snapshot, and verify replay.
  - Compile the runtime pack from the validated snapshot rather than copying the authoring fixture into the app.
guardrails:
  - Historical claims require at least one authoritative source link before compilation.
  - Reconstruction scenes and learning prompts require grounding claims.
  - Preserve qualified certainty for debated historical interpretations.
  - Keep source locators and compact paraphrases in the graph; do not copy restricted archival bodies.
  - Keep runtime offline and deterministic; Vellis and language models are optional during play.
  - Use graph-qualified identity for every compiled graph reference.
